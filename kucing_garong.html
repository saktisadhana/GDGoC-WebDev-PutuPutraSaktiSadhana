<!DOCTYPE html>
<html>
    <head>
        <title>
            GDGOC ITS - Registration Form
        </title>
        <<link rel="stylesheet" href="style-css">
    </head>
    <body>
        <header class="site-header">
            <h1>
                GDGOC - ITS Hnads On
            </h1>
        </header>
        <main class="container">
            <section class="card">
                <h2>About The Event</h2>
                <p>Build a event registration form</p>
            </section>
            <section class="card">
                <h2>Topic Covered</h2>
                <ul>
                <li>HTML: basic structure and sematic elements</li>
                <li>CSS: selector, layout, and styling</li>
                <li>JavaScript: DOM, events, functions, and arrays</li>
                </ul>
            </section>
            <section class="form" id="registration-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input id="name" name="name" type="text" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="text" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="level">Experience Level</label>
                    <select id="level" name="level">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
                <div class="form-group form-group-inline">
                    <label for="join-wa">
                        <input id="join-wa" name="join-wa" type="checkbox">
                        Join WA group
                    </label>
                </div>
            </section>
        </main>
        <script src="script.js">
        </script> 
        </body>
</html>
